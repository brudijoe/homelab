myhosts:
  vars:
    ansible_ssh_executable: /usr/bin/ssh
    ansible_python_interpreter: /usr/bin/python3 # current version on raspberry pi python3.13
  hosts:
    raspberrypi_local:
      ansible_host: "{{ ansible_host_name }}"
      ansible_user: "{{ ansible_user_name }}"
      ansible_ssh_pass: "{{ vault_ansible_ssh_pass }}"
